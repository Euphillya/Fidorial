# Fidorial configuration. This file is generated next to the JAR on first startup;
# the copy in the resources serves as a reference.
port=25565
# false = no Mojang authentication (test server only)
online-mode=true
# distance advertised to the client, in chunks
view-distance=8
# actual streaming radius; must be <= view-distance
send-distance=3
# minimum size of a compressed packet, in bytes; negative to disable
compression-threshold=256
world-path=world
plugins-path=plugins
auto-save-seconds=5
# 0 forbidden; leave blank to let the server choose based on core count
region-workers=4
chunk-workers=4
# gamemode given to players joining for the first time: survival, creative, adventure, spectator
default-game-mode=creative
# spawn position for joining players; defaults match the built-in superflat world
spawn-x=8.5
spawn-y=-48.0
spawn-z=8.5
# modt
motd = <red>Fidorial <white>| <blue>Alternative Minecraft Server