name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # Cache Gradle + validation du wrapper incluses
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + tests
        run: ./gradlew build --no-daemon

      - name: Fat jar (shadowJar)
        run: ./gradlew :fidorial-server:shadowJar --no-daemon

      - name: Upload du jar
        uses: actions/upload-artifact@v4
        with:
          name: fidorial-server
          path: fidorial-server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Recuperer le jar
        uses: actions/download-artifact@v4
        with:
          name: fidorial-server
          path: dist

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar
          generate_release_notes: true